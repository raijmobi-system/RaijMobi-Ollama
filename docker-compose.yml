services:
  ollama:
    build: .
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - raijmobi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q llama3.2:3b || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  ollama_data:

networks:
  raijmobi-network:
    external: true